<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- maximum-scale=1 stops iOS Safari's auto-zoom when focusing inputs under
         16px (the message box, chat composer, etc.). Safari deliberately still
         honors pinch-to-zoom despite it, so accessibility zoom is unaffected. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Glidna</title>
    <meta name="description" content="Glidna — where skilled trainers and smart AI keep you aware, accountable, and on track. Powerful with a coach, capable on its own." />
    <!-- PWA: installable as a home-screen app (icons via npm run gen:icons). Also
         helps mic/camera permissions persist on iOS when installed. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#060809" />
    <!-- Appearance (S95). Must run BEFORE first paint, which is why it's inline
         and dependency-free rather than in React: the app would otherwise boot
         dark and visibly flash to light on the first render. Sits AFTER the
         theme-color meta above so it can retag it (the PWA status-bar colour).
         Default "dark" = the app's look since day one, so nobody's appearance
         changes until they pick a theme themselves. Mirrored by applyTheme() in
         App.jsx — keep the two in step. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("glidna-theme") || "dark";
          var dark = pref === "dark" || (pref === "system" && window.matchMedia
            && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "pro" : "light");
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", dark ? "#060809" : "#f4f7f8");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "pro"); // private mode / storage blocked
        }
      })();
    </script>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Glidna" />
    <!-- Open Graph / link-preview card (the graphic that unfurls in Messages, WhatsApp, Slack, etc.).
         og.png is generated by scripts/gen-og.mjs (npm run gen:og). Update the absolute URLs below
         if the production domain changes. Per-invite personalized cards layer on later. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Glidna" />
    <meta property="og:title" content="Glidna" />
    <meta property="og:description" content="Where skilled trainers and smart AI keep you aware, accountable, and on track." />
    <meta property="og:url" content="https://glidna.com/" />
    <meta property="og:image" content="https://glidna.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Glidna" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Glidna" />
    <meta name="twitter:description" content="Where skilled trainers and smart AI keep you aware, accountable, and on track." />
    <meta name="twitter:image" content="https://glidna.com/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
